name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'

      - name: Install dependencies
        run: |
          Rscript -e "install.packages(c('testthat'))"

      - name: Run Tests
        run: |
          Rscript -e "testthat::test_dir('tests')"
